  max-width: 720px;
  margin: 0 auto;
  padding: 60px 16px;
  text-align: center;
}
.coming {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 50px 30px;
}
.coming .icon {
  font-size: 3.5em;
  margin-bottom: 14px;
}
.coming h2 {
  font-size: 1.3em;
  color: #c0392b;
  margin-bottom: 14px;
}
.coming p {
  color: #666;
  font-size: .95em;
  line-height: 1.9;
}
@media (max-width: 600px) {
  header h1 { font-size: 1.25em; }
