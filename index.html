<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教採ナビ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #f0f2f5;
  color: #333;
  line-height: 1.8;
  min-height: 100vh;
}

/* === ヘッダー: ナビゲーション風デザイン === */
header {
  background:
    radial-gradient(ellipse at top right, rgba(0,210,255,.18) 0%, transparent 55%),
    radial-gradient(circle at 15% 90%, rgba(58,123,213,.22) 0%, transparent 50%),
    linear-gradient(135deg, #0c2461 0%, #1e3799 45%, #0a3d62 100%);
  color: #fff;
  padding: 50px 20px 36px;
  text-align: center;
  box-shadow: 0 6px 24px rgba(0,0,0,.32);
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none;
}
header::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, #00d2ff 30%, #3a7bd5 50%, #00d2ff 70%, transparent 100%);
  box-shadow: 0 0 18px rgba(0,210,255,.7);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 18px;
  position: relative;
  z-index: 1;
}
.brand-icon {
  width: 76px;
  height: 76px;
  border-radius: 20px;
  background: linear-gradient(135deg, #00d2ff, #3a7bd5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.3em;
  flex-shrink: 0;
  box-shadow:
    0 8px 22px rgba(0,210,255,.35),
    inset 0 1px 0 rgba(255,255,255,.35),
    inset 0 -2px 4px rgba(0,0,0,.15);
  position: relative;
}
.brand-icon::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 24px;
  background: linear-gradient(135deg, rgba(0,210,255,.4), transparent 60%);
  z-index: -1;
  filter: blur(8px);
}
.brand-text { text-align: left; }
.brand-title {
  font-size: 3.4em;
  font-weight: 900;
  letter-spacing: .02em;
  line-height: 1;
  margin: 0;
  font-family: 'Hiragino Kaku Gothic ProN W9', 'Hiragino Sans W9', 'Yu Gothic UI', 'Meiryo', 'MS Gothic', sans-serif;
}
.brand-title .kyou,
.brand-title .navi {
  color: #ffeb3b;
  font-weight: 900;
  text-shadow:
    -1.5px -1.5px 0 #0a1942,
     1.5px -1.5px 0 #0a1942,
    -1.5px  1.5px 0 #0a1942,
     1.5px  1.5px 0 #0a1942,
     0      3px   0 #0a3d62,
     0      6px   12px rgba(0,0,0,.55);
}
.brand-title .navi { padding-left: 6px; }
.brand-tagline {
  display: inline-block;
  margin-top: 14px;
  padding: 5px 16px;
  font-size: .95em;
  letter-spacing: .3em;
  padding-left: calc(16px + .3em);
  font-weight: 500;
  color: rgba(255,255,255,.92);
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(79,195,247,.5);
  border-radius: 3px;
}

/* === コンテナ === */
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 36px 16px;
}

.intro {
  text-align: center;
  color: #666;
  font-size: .98em;
  margin-bottom: 28px;
  line-height: 1.9;
}

/* === メニューカード === */
.menu {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.menu-card {
  display: flex;
  align-items: center;
  gap: 22px;
  padding: 26px 30px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 3px 14px rgba(0,0,0,.09);
  text-decoration: none;
  color: inherit;
  border: 2px solid transparent;
  transition: all .18s;
  position: relative;
}
.menu-card:hover {
  border-color: var(--accent, #888);
  box-shadow: 0 6px 22px rgba(0,0,0,.15);
  transform: translateY(-3px);
}
.menu-card.disabled {
  opacity: .8;
  cursor: pointer;
}

.menu-icon {
  flex-shrink: 0;
  width: 78px;
  height: 78px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2em;
  color: #fff;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}
.menu-card.study { --accent: #1976d2; }
.menu-card.study .menu-icon { background: linear-gradient(135deg, #2196f3, #1565c0); }
.menu-card.info  { --accent: #16a085; }
.menu-card.info  .menu-icon { background: linear-gradient(135deg, #1abc9c, #117a65); }
.menu-card.news  { --accent: #d35400; }
.menu-card.news  .menu-icon { background: linear-gradient(135deg, #e67e22, #c0392b); }

.menu-body { flex: 1; min-width: 0; }
.menu-title {
  font-size: 1.3em;
  font-weight: bold;
  color: #2c3e50;
  margin-bottom: 6px;
}
.menu-desc {
  font-size: .9em;
  color: #777;
  line-height: 1.75;
}
.menu-arrow {
  flex-shrink: 0;
  font-size: 1.9em;
  color: #bbb;
  font-weight: bold;
}
.menu-card:hover .menu-arrow { color: var(--accent, #555); }
.menu-card .coming-soon {
  position: absolute;
  top: 12px;
  right: 16px;
  background: #f1c40f;
  color: #fff;
  font-size: .68em;
  font-weight: bold;
  padding: 2px 10px;
  border-radius: 10px;
  letter-spacing: .04em;
}

footer {
  text-align: center;
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid #e0e0e0;
  font-size: .78em;
  color: #999;
}

/* === レスポンシブ === */
@media (max-width: 600px) {
  header { padding: 36px 16px 28px; }
  .brand { gap: 12px; }
  .brand-icon { width: 56px; height: 56px; border-radius: 14px; font-size: 1.6em; }
  .brand-title { font-size: 2.2em; }
  .brand-title .kyou,
  .brand-title .navi {
    text-shadow:
      -1px -1px 0 #0a1942,
       1px -1px 0 #0a1942,
      -1px  1px 0 #0a1942,
       1px  1px 0 #0a1942,
       0   2px 0 #0a3d62,
       0   4px 8px rgba(0,0,0,.5);
  }
  .brand-tagline { font-size: .82em; letter-spacing: .25em; padding-left: calc(14px + .25em); padding-right: 14px; }
  .menu-card { padding: 20px; gap: 14px; }
  .menu-icon { width: 60px; height: 60px; font-size: 1.7em; }
  .menu-title { font-size: 1.15em; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">🧭</div>
    <div class="brand-text">
      <h1 class="brand-title"><span class="kyou">教採</span><span class="navi">ナビ</span></h1>
      <div class="brand-tagline">教員志望者向け総合アプリ</div>
    </div>
  </div>
</header>

<div class="container">

  <p class="intro">学習・情報収集を、すべてここから。</p>

  <div class="menu">

    <a href="kyoshoku.html" class="menu-card study">
      <div class="menu-icon">📖</div>
      <div class="menu-body">
        <div class="menu-title">教職教養を学習する</div>
        <div class="menu-desc">問題演習＆要点理解・過去問演習・用語解説・教育法規スコープの4コンテンツで、教職教養を体系的に学習できます。</div>
      </div>
      <div class="menu-arrow">›</div>
    </a>

    <a href="joho.html" class="menu-card info">
      <div class="menu-icon">📋</div>
      <div class="menu-body">
        <div class="menu-title">教採関連情報を見る</div>
        <div class="menu-desc">試験日程、各自治体の倍率・出題傾向、面接対策などの最新情報をチェックできます。</div>
      </div>
      <div class="menu-arrow">›</div>
    </a>

    <a href="news.html" class="menu-card news">
      <div class="menu-icon">📰</div>
      <div class="menu-body">
        <div class="menu-title">教育ニュースを見る</div>
        <div class="menu-desc">教育界の最新ニュース、文部科学省の発表、注目の教育トピックを定期的にお届けします。</div>
      </div>
      <div class="menu-arrow">›</div>
      <span class="coming-soon">準備中</span>
    </a>

  </div>

  <footer>© 教員養成セミナー</footer>

</div>

</body>
</html>
