<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教採クエスト　学習コンテンツ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #f0f2f5;
  color: #333;
  line-height: 1.8;
  min-height: 100vh;
}

header {
  background:
    /* 星のような輝点（スパークル） */
    radial-gradient(1.5px 1.5px at 12% 22%, rgba(255,255,255,.9), transparent 50%),
    radial-gradient(2px 2px at 88% 15%, rgba(255,213,79,.85), transparent 50%),
    radial-gradient(1px 1px at 25% 70%, rgba(255,255,255,.75), transparent 50%),
    radial-gradient(2px 2px at 75% 80%, rgba(255,193,7,.9), transparent 50%),
    radial-gradient(1.5px 1.5px at 50% 12%, rgba(255,255,255,.85), transparent 50%),
    radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,.6), transparent 50%),
    radial-gradient(2px 2px at 18% 88%, rgba(255,213,79,.8), transparent 50%),
    radial-gradient(1px 1px at 92% 55%, rgba(255,255,255,.7), transparent 50%),
    /* 中央上下のグロウ */
    radial-gradient(ellipse at top, rgba(255,213,79,.22) 0%, transparent 55%),
    radial-gradient(circle at 85% 80%, rgba(255,143,0,.18) 0%, transparent 55%),
    /* ベース夜空 */
    linear-gradient(135deg, #0a0e2c 0%, #1a237e 45%, #2c1968 100%);
  color: #fff;
  padding: 52px 20px 30px;
  text-align: center;
  box-shadow: 0 6px 22px rgba(0,0,0,.35);
  position: relative;
  overflow: hidden;
}
/* 上下のアクセントライン */
header::before {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 5px;
  background: linear-gradient(90deg, transparent 0%, #ffd54f 20%, #ff6f00 50%, #ffd54f 80%, transparent 100%);
  box-shadow: 0 0 14px rgba(255,193,7,.7);
}
header::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 5px;
  background: linear-gradient(90deg, transparent 0%, #ffd54f 20%, #ff6f00 50%, #ffd54f 80%, transparent 100%);
  box-shadow: 0 0 14px rgba(255,193,7,.7);
}

.title-block {
  display: inline-flex;
  align-items: center;
  gap: 22px;
  position: relative;
  z-index: 1;
  margin-bottom: 8px;
}
/* 左右の装飾アイコンに「剣のクロス」を使用（冒険感） */
.title-deco {
  font-size: 1.9em;
  color: #ffd54f;
  text-shadow:
    0 0 8px rgba(255,213,79,.95),
    0 0 22px rgba(255,143,0,.7),
    0 2px 4px rgba(0,0,0,.6);
  animation: twinkle 2.4s ease-in-out infinite alternate;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.5));
}
.title-deco.right { animation-delay: 1.2s; transform: scaleX(-1); }
@keyframes twinkle {
  0%   { opacity: .6;  transform: scale(.9)  rotate(-6deg); }
  100% { opacity: 1;   transform: scale(1.15) rotate(6deg); }
}
.title-deco.right { animation: twinkle-r 2.4s ease-in-out infinite alternate; animation-delay: 1.2s; }
@keyframes twinkle-r {
  0%   { opacity: .6;  transform: scaleX(-1) scale(.9)  rotate(6deg); }
  100% { opacity: 1;   transform: scaleX(-1) scale(1.15) rotate(-6deg); }
}

/* タイトル上のスター列（冒険らしさ） */
.title-stars {
  position: relative;
  z-index: 1;
  font-size: .85em;
  letter-spacing: .8em;
  padding-left: .8em;
  color: #ffd54f;
  margin-bottom: 4px;
  opacity: .85;
  text-shadow: 0 0 6px rgba(255,213,79,.7);
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-2px); }
}

/* メインロゴ: 太いゴシックで力強く + 金色グラデ + 紺の縁取り + 立体影 */
.title-main {
  font-size: 3.4em;
  font-weight: 900;
  letter-spacing: .04em;
  margin: 0;
  font-family: 'Hiragino Kaku Gothic ProN W9', 'Hiragino Sans W9', 'Yu Gothic UI', 'Meiryo', 'MS Gothic', sans-serif;
  background:
    linear-gradient(180deg,
      #fffde7 0%,
      #ffe082 25%,
      #ffd54f 50%,
      #ff8f00 80%,
      #e65100 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  /* 紺の縁取り（4方向）＋下方向の立体影＋足元のソフトシャドウ */
  filter:
    drop-shadow( 2px  0   0 #0d1336)
    drop-shadow(-2px  0   0 #0d1336)
    drop-shadow( 0    2px 0 #0d1336)
    drop-shadow( 0   -2px 0 #0d1336)
    drop-shadow( 0    5px 0 #1a237e)
    drop-shadow( 0    8px 14px rgba(0,0,0,.7));
  line-height: 1.1;
}

.title-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 16px auto 10px;
  position: relative;
  z-index: 1;
}
.title-divider .line {
  width: 70px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ffd54f 50%, #ff8f00 100%);
  box-shadow: 0 0 8px rgba(255,193,7,.5);
}
.title-divider .line.right {
  background: linear-gradient(90deg, #ff8f00 0%, #ffd54f 50%, transparent);
}
.title-divider .diamond {
  font-size: 1.1em;
  color: #ffd54f;
  text-shadow: 0 0 10px rgba(255,213,79,.9), 0 0 18px rgba(255,143,0,.6);
  animation: gem 2.6s ease-in-out infinite alternate;
}
@keyframes gem {
  0%   { transform: rotate(0)   scale(1);    filter: brightness(1); }
  100% { transform: rotate(360deg) scale(1.12); filter: brightness(1.3); }
}

.title-sub {
  font-size: 1.05em;
  letter-spacing: .55em;
  padding-left: .55em;
  font-weight: bold;
  color: #fff;
  text-shadow:
    0 0 4px rgba(255,213,79,.5),
    0 2px 5px rgba(0,0,0,.6);
  position: relative;
  z-index: 1;
  margin-bottom: 14px;
}
header .subtitle {
  font-size: .8em;
  opacity: .78;
  letter-spacing: .08em;
  position: relative;
  z-index: 1;
}

@media (max-width: 600px) {
  header { padding: 38px 16px 22px; }
  .title-main {
    font-size: 2.2em;
    letter-spacing: .02em;
    filter:
      drop-shadow( 1.5px  0    0 #0d1336)
      drop-shadow(-1.5px  0    0 #0d1336)
      drop-shadow( 0     1.5px 0 #0d1336)
      drop-shadow( 0    -1.5px 0 #0d1336)
      drop-shadow( 0     3px   0 #1a237e)
      drop-shadow( 0     6px   10px rgba(0,0,0,.6));
  }
  .title-block { gap: 12px; }
  .title-deco { font-size: 1.4em; }
  .title-sub { font-size: .9em; letter-spacing: .35em; padding-left: .35em; }
}

.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 30px 16px;
}

.intro {
  text-align: center;
  color: #666;
  font-size: .95em;
  margin-bottom: 26px;
  line-height: 1.9;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.menu-card {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 24px 28px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  text-decoration: none;
  color: inherit;
  border: 2px solid transparent;
  transition: all .15s;
}
.menu-card:hover {
  border-color: var(--accent, #888);
  box-shadow: 0 4px 18px rgba(0,0,0,.13);
  transform: translateY(-2px);
}

.menu-icon {
  flex-shrink: 0;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2em;
  color: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
}
.menu-card.mondai   { --accent: #f39c12; }
.menu-card.mondai   .menu-icon { background: linear-gradient(135deg, #f39c12, #e67e22); }
.menu-card.kakomon  { --accent: #2196f3; }
.menu-card.kakomon  .menu-icon { background: linear-gradient(135deg, #2196f3, #1976d2); }
.menu-card.glossary { --accent: #2ecc71; }
.menu-card.glossary .menu-icon { background: linear-gradient(135deg, #2ecc71, #27ae60); }
.menu-card.houki    { --accent: #8d6e63; }
.menu-card.houki    .menu-icon { background: linear-gradient(135deg, #8d6e63, #5d4037); }

.menu-body { flex: 1; min-width: 0; }
.menu-title {
  font-size: 1.2em;
  font-weight: bold;
  color: #333;
  margin-bottom: 4px;
}
.menu-desc {
  font-size: .9em;
  color: #777;
  line-height: 1.7;
}
.menu-arrow {
  flex-shrink: 0;
  font-size: 1.7em;
  color: #bbb;
  font-weight: bold;
}
.menu-card:hover .menu-arrow { color: var(--accent, #555); }

.admin-link {
  text-align: center;
  margin-top: 32px;
  padding-top: 18px;
  border-top: 1px solid #e0e0e0;
}
.admin-link a {
  display: inline-block;
  padding: 8px 18px;
  background: #fff;
  color: #555;
  border: 1px solid #aaa;
  border-radius: 6px;
  text-decoration: none;
  font-size: .85em;
}
.admin-link a:hover {
  background: #f5f5f5;
  border-color: #555;
  color: #222;
}

footer {
  text-align: center;
  margin-top: 30px;
  font-size: .75em;
  color: #999;
}

@media (max-width: 600px) {
  header h1 { font-size: 1.2em; }
  .menu-card { padding: 18px 18px; gap: 14px; }
  .menu-icon { width: 56px; height: 56px; font-size: 1.6em; }
  .menu-title { font-size: 1.05em; }
}
</style>
</head>
<body>
