<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者画面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #f0f2f5;
  color: #333;
  line-height: 1.7;
  min-height: 100vh;
}

header {
  background: linear-gradient(135deg, #34495e, #5d6d7e);
  color: #fff;
  padding: 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header h1 { font-size: 1.3em; letter-spacing: .05em; }
header p {
  font-size: .85em;
  opacity: .85;
  margin-top: 4px;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 30px 16px;
}

.intro {
  text-align: center;
  color: #666;
  font-size: .95em;
  margin-bottom: 26px;
}

.admin-buttons {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.admin-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 22px 24px;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 10px rgba(0,0,0,.08);
  text-decoration: none;
  color: inherit;
  border: 2px solid transparent;
  transition: all .15s;
}
.admin-card:hover {
  border-color: var(--accent, #5d6d7e);
  box-shadow: 0 4px 14px rgba(0,0,0,.12);
  transform: translateY(-2px);
}

.admin-icon {
  flex-shrink: 0;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6em;
  color: #fff;
}
.admin-card.quiz { --accent: #2e86c1; }
.admin-card.quiz .admin-icon { background: linear-gradient(135deg, #2e86c1, #1a5276); }
.admin-card.glossary { --accent: #16a085; }
.admin-card.glossary .admin-icon { background: linear-gradient(135deg, #16a085, #1abc9c); }
.admin-card.houki { --accent: #8d6e63; }
.admin-card.houki .admin-icon { background: linear-gradient(135deg, #8d6e63, #5d4037); }
.admin-card.mondai { --accent: #f39c12; }
.admin-card.mondai .admin-icon { background: linear-gradient(135deg, #f39c12, #e67e22); }

.admin-body { flex: 1; min-width: 0; }
.admin-title {
  font-size: 1.05em;
  font-weight: bold;
  color: #333;
  margin-bottom: 3px;
}
.admin-desc {
  font-size: .85em;
  color: #777;
}
.admin-arrow {
  flex-shrink: 0;
  font-size: 1.4em;
  color: #aaa;
}
.admin-card:hover .admin-arrow { color: var(--accent, #5d6d7e); }

.admin-card.disabled {
  cursor: default;
  opacity: .7;
}
.admin-card.disabled:hover {
  border-color: transparent;
  box-shadow: 0 2px 10px rgba(0,0,0,.08);
  transform: none;
}
.admin-card .badge {
  display: inline-block;
  background: #f5b041;
  color: #fff;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: .72em;
  margin-left: 6px;
  vertical-align: middle;
}

.back-section {
  margin-top: 36px;
  text-align: center;
}
.back-section a {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  margin: 4px 6px;
  padding: 10px 20px;
  border: 1px solid #aaa;
  border-radius: 7px;
  text-decoration: none;
  color: #555;
  font-size: .95em;
  font-weight: bold;
}
.back-section a .link-icon { font-size: 1.15em; line-height: 1; }
.back-section a:hover {
  background: #fff;
  border-color: #555;
  color: #222;
}
.back-section a.link-glossary {
  border-color: #2ecc71;
  color: #fff;
  background: #2ecc71;
}
.back-section a.link-glossary:hover {
  background: #27ae60;
  border-color: #27ae60;
  color: #fff;
}
.back-section a.link-houki {
  border-color: #8d6e63;
  color: #fff;
  background: #8d6e63;
}
.back-section a.link-houki:hover {
  background: #5d4037;
  border-color: #5d4037;
  color: #fff;
}
.back-section a.link-quiz {
  border-color: #2196f3;
  color: #fff;
  background: #2196f3;
}
.back-section a.link-quiz:hover {
  background: #1976d2;
  border-color: #1976d2;
  color: #fff;
}
.back-section a.link-mondai {
  border-color: #f39c12;
  color: #fff;
  background: #f39c12;
}
.back-section a.link-mondai:hover {
  background: #e67e22;
  border-color: #e67e22;
  color: #fff;
}

@media (max-width: 600px) {
  header h1 { font-size: 1.1em; }
  .admin-card { padding: 18px 16px; gap: 12px; }
  .admin-icon { width: 46px; height: 46px; font-size: 1.3em; }
}
</style>
</head>
<body>

<header>
  <h1>管理者画面</h1>
  <p>各コンテンツの管理画面へアクセスできます</p>
</header>

<div class="container">

  <p class="intro">編集したいコンテンツの管理画面を選択してください。</p>

  <div class="admin-buttons">
    <a href="admin.html" class="admin-card quiz">
      <div class="admin-icon">📝</div>
      <div class="admin-body">
        <div class="admin-title">過去問演習　管理者画面</div>
        <div class="admin-desc">過去問題の登録・編集・JSON入出力</div>
      </div>
      <div class="admin-arrow">›</div>
    </a>

    <a href="mondai-admin.html" class="admin-card mondai">
      <div class="admin-icon">💡</div>
      <div class="admin-body">
        <div class="admin-title">問題演習　管理者画面</div>
        <div class="admin-desc">予想問題の登録・編集・JSON/Excel入出力</div>
      </div>
      <div class="admin-arrow">›</div>
    </a>

    <a href="glossary-admin.html" class="admin-card glossary">
      <div class="admin-icon">📚</div>
      <div class="admin-body">
        <div class="admin-title">用語解説　管理者画面</div>
        <div class="admin-desc">用語の登録・編集・Excel入出力</div>
      </div>
      <div class="admin-arrow">›</div>
    </a>

    <a href="houki-scope-admin.html" class="admin-card houki">
      <div class="admin-icon">⚖️</div>
      <div class="admin-body">
        <div class="admin-title">教育法規スコープ　管理者画面</div>
        <div class="admin-desc">条文データの登録・編集・Excel入出力</div>
      </div>
      <div class="admin-arrow">›</div>
    </a>
  </div>

  <div class="back-section">
    <a href="index.html" class="link-quiz"><span class="link-icon">📝</span>過去問演習</a>
    <a href="mondai.html" class="link-mondai"><span class="link-icon">💡</span>問題演習</a>
    <a href="glossary.html" class="link-glossary"><span class="link-icon">📚</span>用語解説</a>
    <a href="houki-scope.html" class="link-houki"><span class="link-icon">⚖️</span>教育法規スコープ</a>
  </div>

</div>

</body>
</html>
