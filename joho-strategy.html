<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試験別の対策法 ─ 教採ナビ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #f0f2f5;
  color: #333;
  line-height: 1.8;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #117a65, #1abc9c);
  color: #fff;
  padding: 22px 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header h1 {
  font-size: 1.4em;
  letter-spacing: .04em;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  text-shadow: 0 2px 4px rgba(0,0,0,.25);
  flex-wrap: wrap;
  justify-content: center;
}
header h1 .title-icon {
  font-size: 1.15em;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,.35));
}
.header-links { margin-top: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.header-links a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  background: linear-gradient(135deg, #0c2461 0%, #1e3799 45%, #0a3d62 100%);
  color: #fff;
  border: 1px solid #0c2461;
  border-radius: 7px;
  text-decoration: none;
  font-size: .88em;
  font-weight: bold;
}
.header-links a:hover { background: linear-gradient(135deg, #061a4a 0%, #142b75 45%, #062a44 100%); }
.header-links a.back-joho {
  background: #fff;
  color: #117a65;
  border-color: #fff;
}
.header-links a.back-joho:hover { background: #d1f2eb; color: #0e5b4a; }

/* タブ */
.tabs {
  max-width: 820px;
  margin: 0 auto;
  padding: 20px 16px 0;
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  justify-content: center;
}
.tab {
  padding: 9px 18px;
  border: 2px solid #1abc9c;
  background: #fff;
  color: #117a65;
  border-radius: 22px;
  font-size: .9em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all .12s;
}
.tab:hover { background: #e8f8f5; }
.tab.active {
  background: linear-gradient(135deg, #117a65, #1abc9c);
  color: #fff;
  border-color: #117a65;
  box-shadow: 0 2px 8px rgba(22,160,133,.35);
}

.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 22px 16px 30px;
}

/* 本文 */
.content-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 32px 32px;
  font-size: 1em;
  line-height: 2;
  white-space: pre-wrap;
  color: #333;
}
.content-card strong { color: #117a65; font-weight: bold; font-size: 1.15em; }
.content-card b { font-weight: bold; }
.content-card u { text-decoration: underline; }
.content-card a { color: #1565c0; word-break: break-word; }
.content-card a:hover { color: #0d47a1; }
.content-card .jump-anchor { scroll-margin-top: 16px; }
.content-card .content-img {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 18px 0;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}

/* 準備中（コンテンツ未登録時） */
.coming {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 50px 30px;
  text-align: center;
}
.coming .icon { font-size: 3.5em; margin-bottom: 14px; }
.coming h2 {
  font-size: 1.3em;
  color: #117a65;
  margin-bottom: 14px;
}
.coming p {
  color: #666;
  font-size: .95em;
  line-height: 1.9;
}

.updated {
  text-align: right;
  font-size: .78em;
  color: #999;
  margin-top: 14px;
}

/* ページ上部へ戻るボタン */
.to-top {
  position: fixed;
  right: 20px;
  bottom: 24px;
  width: 48px;
  height: 48px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, #117a65, #1abc9c);
  color: #fff;
  font-size: 1.5em;
  line-height: 1;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,.28);
  opacity: 0;
  visibility: hidden;
  transition: opacity .25s, visibility .25s;
  z-index: 500;
}
.to-top.show { opacity: .92; visibility: visible; }
.to-top:hover { opacity: 1; filter: brightness(1.08); }

@media (max-width: 600px) {
  header h1 { font-size: 1.1em; }
  .content-card { padding: 22px 18px; font-size: .95em; }
  .tab { padding: 8px 14px; font-size: .85em; }
}
</style>
</head>
<body>
<header>
  <h1><span class="title-icon">🎯</span>試験別の対策法</h1>
  <div class="header-links">
    <a href="joho.html" class="back-joho">← 教採関連情報 トップへ</a>
    <a href="index.html">🏠 教採ナビ トップへ</a>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-key="written" onclick="showTab('written')">筆記試験</button>
  <button class="tab" data-key="interview" onclick="showTab('interview')">面接</button>
  <button class="tab" data-key="essay" onclick="showTab('essay')">論作文</button>
  <button class="tab" data-key="discussion" onclick="showTab('discussion')">集団討論</button>
  <button class="tab" data-key="lesson" onclick="showTab('lesson')">模擬授業</button>
  <button class="tab" data-key="guidance" onclick="showTab('guidance')">場面指導</button>
</div>

<div class="container" id="container">
  <!-- 動的に挿入 -->
</div>

<button id="toTop" class="to-top" aria-label="ページ上部へ" title="ページ上部へ">↑</button>

<script>
var STORAGE_KEY = 'kyosai_joho_strategy';
var SECTION_KEYS = ['written', 'interview', 'essay', 'discussion', 'lesson', 'guidance'];
var SECTION_LABELS = {
  written: '筆記試験', interview: '面接', essay: '論作文',
  discussion: '集団討論', lesson: '模擬授業', guidance: '場面指導'
};
var currentData = { sections: {}, updatedAt: '' };
var currentTab = 'written';

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBody(text) {
  if (!text) return '';
  var s = String(text);

  var images = [];
  s = s.replace(/!\[\]\(([^)]+)\)/g, function(_, url) {
    images.push(url);
    return '@@IMG' + (images.length - 1) + '@@';
  });

  s = escapeHtml(s);
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  s = s.replace(/__(.+?)__/g, '<u>$1</u>');
  // リンク [表示テキスト](URL) ／ ページ内ジャンプ [表示テキスト](#目印名)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, t, url) {
    if (url.charAt(0) === '#') return '<a href="' + url + '" class="jump-link">' + t + '</a>';
    return '<a href="' + url + '" target="_blank" rel="noopener">' + t + '</a>';
  });
  // ジャンプ先の目印 {#目印名}
  s = s.replace(/\{#([^}]+)\}/g, '<span class="jump-anchor" id="$1"></span>');

  for (var i = 0; i < images.length; i++) {
    var marker = '@@IMG' + i + '@@';
    var safe = images[i].replace(/"/g, '&quot;');
    s = s.split(marker).join('<img class="content-img" src="' + safe + '" alt="">');
  }
  return s;
}

function loadStored() {
  try {
    var s = localStorage.getItem(STORAGE_KEY);
    if (!s) return null;
    return JSON.parse(s);
  } catch (e) { return null; }
}

// 旧形式({body})・新形式({sections})の両対応で正規化
function normalize(obj) {
  var out = { sections: {}, updatedAt: (obj && obj.updatedAt) || '' };
  if (obj && obj.sections && typeof obj.sections === 'object') {
    for (var i = 0; i < SECTION_KEYS.length; i++) {
      var k = SECTION_KEYS[i];
      out.sections[k] = (typeof obj.sections[k] === 'string') ? obj.sections[k] : '';
    }
  } else if (obj && typeof obj.body === 'string') {
    // 旧単一本文 → 筆記試験タブに移行
    out.sections.written = obj.body;
  }
  return out;
}

function fmtDate(iso) {
  try {
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var dd = ('0' + d.getDate()).slice(-2);
    return d.getFullYear() + '/' + m + '/' + dd;
  } catch (e) { return ''; }
}

function showTab(key) {
  currentTab = key;
  // タブの見た目
  var btns = document.querySelectorAll('#tabs .tab');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-key') === key);
  }
  // 本文
  var container = document.getElementById('container');
  var body = currentData.sections[key] || '';
  if (!body.trim()) {
    container.innerHTML =
      '<div class="coming">' +
        '<div class="icon">🛠️</div>' +
        '<h2>準備中</h2>' +
        '<p>「' + SECTION_LABELS[key] + '」の対策法は現在準備中です。<br>順次公開予定です。</p>' +
      '</div>';
    return;
  }
  var html = '<div class="content-card">' + renderBody(body) + '</div>';
  var ds = fmtDate(currentData.updatedAt);
  if (ds) html += '<div class="updated">最終更新: ' + ds + '</div>';
  container.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'auto' });
}

// 起動時: 配布JSONを最優先で表示（取得できないときのみlocalStorageを使う）
(function bootstrap() {
  fetch('joho-strategy-data.json', { cache: 'no-cache' })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function(data) {
      if (!data || (typeof data.body !== 'string' && !data.sections)) return Promise.reject();
      currentData = normalize(data);
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(currentData)); } catch (e) {}
    })
    .catch(function() {
      currentData = normalize(loadStored());
    })
    .then(function() {
      showTab(currentTab);
    });
})();

// ページ上部へ戻るボタン
(function() {
  var btn = document.getElementById('toTop');
  if (!btn) return;
  window.addEventListener('scroll', function() {
    if (window.pageYOffset > 300) btn.classList.add('show');
    else btn.classList.remove('show');
  });
  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>

<a href="mypage.html" id="mypageFab" title="マイページ" aria-label="マイページ" style="position:fixed;top:12px;right:14px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.28);z-index:1000;">👤</a>
</body>
</html>
