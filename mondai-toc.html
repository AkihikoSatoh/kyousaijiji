<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目次に沿って演習 ─ 問題演習＆要点理解</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #f0f2f5;
  color: #333;
  line-height: 1.8;
  min-height: 100vh;
}

header {
  background: linear-gradient(135deg, #e67e22, #f39c12);
  color: #fff;
  padding: 16px 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header h1 { font-size: 1.2em; letter-spacing: .05em; }
.header-links { margin-top: 8px; }
.header-links a {
  color: rgba(255,255,255,.85);
  font-size: .92em;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,.4);
  padding: 7px 16px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: bold;
}
.header-links a:hover { background: rgba(255,255,255,.15); }

.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 24px 16px;
}

.intro {
  text-align: center;
  color: #666;
  font-size: .92em;
  margin-bottom: 16px;
}

/* タブナビ */
.tab-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  background: #fff;
  padding: 8px;
  border-radius: 10px 10px 0 0;
  box-shadow: 0 2px 10px rgba(0,0,0,.06);
  border-bottom: 3px solid #e67e22;
}
.tab-btn {
  flex: 1 1 auto;
  min-width: 90px;
  padding: 10px 14px;
  border: 1px solid #fad7a0;
  border-radius: 8px;
  background: #fff;
  color: #d35400;
  font-size: .92em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.tab-btn:hover {
  background: #fdebd0;
  border-color: #e67e22;
}
.tab-btn.active {
  background: linear-gradient(135deg, #e67e22, #d35400);
  color: #fff;
  border-color: #d35400;
  box-shadow: 0 2px 6px rgba(211,84,0,.35);
}

.category-section {
  background: #fff;
  border-radius: 0 0 10px 10px;
  box-shadow: 0 2px 10px rgba(0,0,0,.06);
  margin-bottom: 18px;
  overflow: hidden;
}
.category-section.hidden { display: none; }

.category-title {
  background: linear-gradient(135deg, #e67e22, #f39c12);
  color: #fff;
  padding: 12px 20px;
  font-size: 1.05em;
  font-weight: bold;
  letter-spacing: .04em;
}

.category-body { padding: 8px 0; }

.empty-category {
  text-align: center;
  padding: 40px 20px;
  color: #aaa;
  font-size: .9em;
}

/* 分野統計バナー */
.category-stats {
  margin: 10px 14px 12px;
  padding: 10px 14px;
  background: linear-gradient(135deg, #e3f2fd, #e1f5fe);
  border: 1px solid #90caf9;
  border-left: 4px solid #1976d2;
  border-radius: 6px;
  font-size: .88em;
  color: #0d47a1;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 14px;
}
.category-stats.empty {
  background: #fafafa;
  border-color: #e0e0e0;
  border-left-color: #bdbdbd;
  color: #999;
}
.category-stats .cs-label { font-weight: bold; }
.category-stats strong { font-size: 1.1em; color: #1565c0; }
.category-stats .rate-low strong { color: #c0392b; }

/* 項目行の正答率・ハイライト */
.item-rate {
  font-size: .82em;
  color: #1976d2;
  font-weight: bold;
}
.item-rate.unrated { color: #bbb; font-weight: normal; }
.item-row.low-rate {
  background: #fef5e7;
  border-left: 3px solid #e67e22;
  padding-left: 61px; /* 64 - 3 to keep alignment */
}
.item-row .item-rate.low {
  color: #c0392b;
}
.item-row.low-rate .item-rate.low::before {
  content: '⚠ ';
}

/* チェック済みボックス（各タブ上部） */
.checked-box-toc {
  background: linear-gradient(135deg, #fef9e7, #fff8e1);
  border: 1px solid #f1c40f;
  border-radius: 8px;
  padding: 12px 16px;
  margin: 10px 14px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.checked-box-toc.empty {
  background: #fafafa;
  border-color: #e0e0e0;
}
.checked-box-toc .checked-info {
  flex: 1;
  font-size: .9em;
  font-weight: bold;
  color: #7d6608;
}
.checked-box-toc.empty .checked-info {
  color: #999;
  font-weight: normal;
}
.checked-box-toc .checked-list-btn {
  padding: 6px 14px;
  border: 1px solid #b7950b;
  border-radius: 5px;
  background: #fff;
  color: #7d6608;
  font-size: .82em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
}
.checked-box-toc .checked-list-btn:hover { background: rgba(241,196,15,.18); }
.checked-box-toc .checked-quiz-btn {
  padding: 6px 16px;
  border: none;
  border-radius: 5px;
  background: linear-gradient(135deg, #f1c40f, #d4a017);
  color: #fff;
  font-size: .85em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
}
.checked-box-toc .checked-quiz-btn:hover { opacity: .9; }

/* チェック済み一覧モーダル */
.checked-overlay-toc {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 500;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.checked-overlay-toc.show { display: flex; }
.checked-modal-toc {
  background: #fff;
  border-radius: 12px;
  width: min(680px, 100%);
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,.3);
}
.checked-modal-toc .header {
  background: linear-gradient(135deg, #d4a017, #f1c40f);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
}
.checked-modal-toc .header h3 { font-size: 1.05em; }
.checked-modal-toc .close-x {
  width: 30px;
  height: 30px;
  border: none;
  background: rgba(255,255,255,.18);
  color: #fff;
  font-size: 1.2em;
  cursor: pointer;
  border-radius: 4px;
}
.checked-modal-toc .body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 20px;
}
.checked-modal-toc .empty {
  text-align: center;
  color: #999;
  padding: 40px 20px;
}
.checked-modal-toc .ci {
  padding: 12px 14px;
  border: 1px solid #eee;
  border-left: 3px solid #f1c40f;
  border-radius: 6px;
  margin-bottom: 8px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.checked-modal-toc .ci-body { flex: 1; min-width: 0; }
.checked-modal-toc .ci-meta {
  font-size: .78em;
  color: #999;
  margin-bottom: 4px;
}
.checked-modal-toc .ci-meta .tag {
  display: inline-block;
  background: #f0f2f5;
  padding: 1px 8px;
  border-radius: 4px;
  margin-right: 4px;
  color: #666;
}
.checked-modal-toc .ci-text {
  font-size: .9em;
  color: #444;
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.checked-modal-toc .ci-remove {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border: 1px solid #ddd;
  background: #fff;
  border-radius: 5px;
  color: #e74c3c;
  cursor: pointer;
}
.checked-modal-toc .ci-remove:hover { border-color: #e74c3c; background: #fdedec; }
.checked-modal-toc .footer {
  border-top: 1px solid #eee;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.checked-modal-toc .clear-all {
  padding: 7px 14px;
  border: 1px solid #e74c3c;
  border-radius: 5px;
  background: #fff;
  color: #e74c3c;
  font-size: .85em;
  cursor: pointer;
  font-family: inherit;
}
.checked-modal-toc .clear-all:hover { background: #fdedec; }
.checked-modal-toc .close-btn {
  padding: 7px 20px;
  border: none;
  border-radius: 5px;
  background: #eee;
  color: #555;
  font-size: .88em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
}

.area-group {
  border-bottom: 1px solid #f0f0f0;
}
.area-group:last-child { border-bottom: none; }

.area-header {
  padding: 12px 22px 8px;
  font-size: .98em;
  font-weight: bold;
  color: #d35400;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.area-header .area-num {
  display: inline-block;
  min-width: 28px;
  text-align: center;
  background: #fdebd0;
  color: #d35400;
  padding: 1px 8px;
  border-radius: 3px;
  font-size: .85em;
}

.item-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 22px 8px 64px;
  border-top: 1px dashed #f0f0f0;
  transition: background .12s;
}
.item-row:hover { background: #fffaf2; }
.item-row .item-num {
  display: inline-block;
  min-width: 24px;
  text-align: center;
  background: #f5f5f5;
  color: #888;
  padding: 1px 7px;
  border-radius: 3px;
  font-size: .82em;
}
.item-row .item-name {
  flex: 1;
  font-size: .95em;
  color: #444;
}
.item-row .item-count {
  color: #999;
  font-size: .82em;
}
.item-row .item-go {
  flex-shrink: 0;
  padding: 6px 16px;
  border: none;
  border-radius: 6px;
  background: linear-gradient(135deg, #e67e22, #d35400);
  color: #fff;
  font-size: .85em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
}
.item-row .item-go:hover { opacity: .9; }

.empty-msg {
  text-align: center;
  padding: 50px 20px;
  color: #999;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 10px rgba(0,0,0,.06);
}

.back-link {
  text-align: center;
  margin-top: 20px;
}
.back-link a {
  display: inline-block;
  padding: 8px 18px;
  background: #fff;
  color: #555;
  border: 1px solid #ccc;
  border-radius: 6px;
  text-decoration: none;
  font-size: .9em;
}
.back-link a:hover { background: #f8f8f8; }

@media (max-width: 600px) {
  header h1 { font-size: 1.05em; }
  .item-row { padding: 8px 14px 8px 42px; }
  .area-header { padding: 12px 14px 8px; }
}
</style>
</head>
<body>

<header>
  <h1>目次に沿って演習</h1>
  <div class="header-links">
    <a href="mondai.html">← 問題演習＆要点理解トップに戻る</a>
  </div>
</header>

<div class="container">
  <p class="intro">分野を選んで、領域・項目から問題を登録順に演習できます。</p>
  <div class="tab-nav" id="tabNav"></div>
  <div id="tocBody"></div>
  <div class="back-link">
    <a href="mondai.html">← 問題演習＆要点理解 トップへ</a>
  </div>
</div>

<!-- チェック済み問題 一覧モーダル -->
<div class="checked-overlay-toc" id="checkedOverlay" onclick="if(event.target===this)closeCheckedList()">
  <div class="checked-modal-toc">
    <div class="header">
      <h3 id="checkedModalTitle">チェック済み問題</h3>
      <button class="close-x" onclick="closeCheckedList()">×</button>
    </div>
    <div class="body" id="checkedModalBody"></div>
    <div class="footer">
      <button class="clear-all" onclick="clearChecksInCurrentCategory()">この分野をすべて解除</button>
      <button class="close-btn" onclick="closeCheckedList()">閉じる</button>
    </div>
  </div>
</div>

<script>
var STORAGE_KEY = 'kyosai_mondai';
var CHECK_KEY = 'kyosai_mondai_checks';
var STATS_KEY = 'kyosai_mondai_stats';

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY) || '{}') || {}; }
  catch (e) { return {}; }
}
// 質問配列の合計集計（questionKey は後段で定義）
function aggregateStats(questions) {
  var stats = loadStats();
  var ans = 0, cor = 0, withData = 0;
  questions.forEach(function(q) {
    var s = stats[questionKey(q)];
    if (s && s.answered > 0) {
      ans += s.answered;
      cor += s.correct;
      withData++;
    }
  });
  var rate = ans > 0 ? Math.round((cor / ans) * 100) : null;
  return { answered: ans, correct: cor, rate: rate, count: questions.length, withData: withData };
}

// タブとして表示する分野（6つ）。ローカル問題はタブに含めない。
var TAB_CATEGORIES = [
  '教育原理', '学習指導要領', '教育史', '教育心理', '教育法規', '教育時事'
];

var currentModalCategory = '';

function loadChecks() {
  try {
    var s = localStorage.getItem(CHECK_KEY);
    return s ? (JSON.parse(s) || {}) : {};
  } catch (e) { return {}; }
}
function saveChecks(c) { localStorage.setItem(CHECK_KEY, JSON.stringify(c)); }

// mondai-random.html と同じハッシュ関数（同一性を保証）
function questionKey(q) {
  var key = (q.question || '') + '|' + (q.choices && q.choices[0] || '');
  var h = 0;
  for (var i = 0; i < key.length; i++) {
    h = ((h << 5) - h) + key.charCodeAt(i);
    h |= 0;
  }
  return 'q' + h;
}

function getChecksByCategory(cat) {
  var checks = loadChecks();
  var result = [];
  Object.keys(checks).forEach(function(k) {
    var entry = checks[k];
    if (entry && entry.question && (entry.question.category || '') === cat) {
      result.push({ key: k, data: entry });
    }
  });
  // チェック日時降順
  result.sort(function(a, b) {
    return (b.data.checkedAt || '').localeCompare(a.data.checkedAt || '');
  });
  return result;
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadQuestions() {
  try {
    var s = localStorage.getItem(STORAGE_KEY);
    if (!s) return [];
    var arr = JSON.parse(s);
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}

function renderToc(questions) {
  var body = document.getElementById('tocBody');
  var nav  = document.getElementById('tabNav');

  if (!questions || questions.length === 0) {
    nav.innerHTML = '';
    body.innerHTML = '<div class="empty-msg">登録された問題がありません。<br><br>管理画面から問題を登録してください。</div>';
    return;
  }

  // 分野ごとにグループ化（出現順を保持）
  var categoryGroups = {}; // category -> { _areas, _data: { area: { _items, _data: { item: [qs] } } } }

  questions.forEach(function(q) {
    var cat  = q.category || '未分類';
    var area = q.area     || '（領域未設定）';
    var item = q.item     || '（項目未設定）';
    if (!categoryGroups[cat]) {
      categoryGroups[cat] = { _areas: [], _data: {} };
    }
    var g = categoryGroups[cat];
    if (!g._data[area]) {
      g._areas.push(area);
      g._data[area] = { _items: [], _data: {} };
    }
    var a = g._data[area];
    if (!a._data[item]) {
      a._items.push(item);
      a._data[item] = [];
    }
    a._data[item].push(q);
  });

  // タブナビを構築
  var navHtml = '';
  TAB_CATEGORIES.forEach(function(cat, i) {
    navHtml += '<button type="button" class="tab-btn' + (i === 0 ? ' active' : '') + '" ' +
      'data-cat="' + escapeHtml(cat) + '">' +
      escapeHtml(cat) +
      '</button>';
  });
  nav.innerHTML = navHtml;

  // 各分野のセクションを構築（最初のタブのみ表示）
  var sectionHtml = '';
  TAB_CATEGORIES.forEach(function(cat, i) {
    var hiddenCls = (i === 0 ? '' : ' hidden');
    sectionHtml += '<div class="category-section' + hiddenCls + '" data-cat="' + escapeHtml(cat) + '">';
    sectionHtml += '<div class="category-title">' + escapeHtml(cat) + '</div>';
    sectionHtml += '<div class="category-body">';

    // 分野統計バナー
    var catQuestions = [];
    if (categoryGroups[cat]) {
      categoryGroups[cat]._areas.forEach(function(area) {
        categoryGroups[cat]._data[area]._items.forEach(function(item) {
          catQuestions = catQuestions.concat(categoryGroups[cat]._data[area]._data[item]);
        });
      });
    }
    var catStats = aggregateStats(catQuestions);
    if (catStats.answered > 0) {
      var catRateCls = (catStats.rate !== null && catStats.rate <= 50) ? ' rate-low' : '';
      sectionHtml += '<div class="category-stats' + catRateCls + '">' +
        '<span class="cs-label">📊 ' + escapeHtml(cat) + ' の実績</span>' +
        '<span>正答率 <strong>' + catStats.rate + '%</strong>（' + catStats.answered + '回解答）</span>' +
      '</div>';
    } else {
      sectionHtml += '<div class="category-stats empty">' +
        '<span class="cs-label">📊 まだ解答実績がありません</span>' +
      '</div>';
    }

    // チェック済み問題ボックス
    var checkedInCat = getChecksByCategory(cat).length;
    if (checkedInCat > 0) {
      sectionHtml += '<div class="checked-box-toc">' +
        '<div class="checked-info">★ チェック済みの問題: ' + checkedInCat + ' 問</div>' +
        '<button class="checked-list-btn" onclick="openCheckedList(\'' + cat.replace(/'/g, "\\'") + '\')">一覧を見る</button>' +
        '<button class="checked-quiz-btn" onclick="startCheckedQuiz(\'' + cat.replace(/'/g, "\\'") + '\')">演習する</button>' +
      '</div>';
    } else {
      sectionHtml += '<div class="checked-box-toc empty">' +
        '<div class="checked-info">★ チェック済みの問題はまだありません（演習中に問題を「チェック」すると、ここに表示されます）</div>' +
      '</div>';
    }

    var g = categoryGroups[cat];
    if (!g || g._areas.length === 0) {
      sectionHtml += '<div class="empty-category">この分野の問題はまだ登録されていません。</div>';
    } else {
      g._areas.forEach(function(area, areaIdx) {
        var a = g._data[area];
        var areaNum = (areaIdx + 1);
        sectionHtml += '<div class="area-group">';
        sectionHtml += '<div class="area-header">' +
          '<span class="area-num">' + areaNum + '</span>' +
          '<span>' + escapeHtml(area) + '</span>' +
        '</div>';
        a._items.forEach(function(item, itemIdx) {
          var qs = a._data[item];
          var itemNum = (itemIdx + 1);
          var url = 'mondai-random.html?category=' + encodeURIComponent(cat) +
                    '&area=' + encodeURIComponent(area) +
                    '&item=' + encodeURIComponent(item) +
                    '&seq=1';
          // 項目統計
          var itemStats = aggregateStats(qs);
          var isLow = (itemStats.rate !== null && itemStats.rate <= 50 && itemStats.answered >= 2);
          var rowCls = isLow ? 'item-row low-rate' : 'item-row';
          var rateHtml;
          if (itemStats.rate !== null) {
            rateHtml = '<span class="item-rate' + (isLow ? ' low' : '') + '">正答率 ' + itemStats.rate + '%（' + itemStats.answered + '回解答）</span>';
          } else {
            rateHtml = '<span class="item-rate unrated">未挑戦</span>';
          }
          sectionHtml += '<div class="' + rowCls + '">' +
            '<span class="item-num">' + itemNum + '</span>' +
            '<span class="item-name">' + escapeHtml(item) + '</span>' +
            '<span class="item-count">（' + qs.length + '問）</span>' +
            rateHtml +
            '<a href="' + url + '" class="item-go">演習</a>' +
          '</div>';
        });
        sectionHtml += '</div>';
      });
    }

    sectionHtml += '</div></div>';
  });
  body.innerHTML = sectionHtml;

  // タブクリックで表示切替
  nav.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.onclick = function() {
      var cat = btn.getAttribute('data-cat');
      nav.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      body.querySelectorAll('.category-section').forEach(function(sec) {
        if (sec.getAttribute('data-cat') === cat) sec.classList.remove('hidden');
        else sec.classList.add('hidden');
      });
    };
  });
}

// ── チェック済み問題: モーダル/演習 ──
function openCheckedList(cat) {
  currentModalCategory = cat;
  var entries = getChecksByCategory(cat);
  document.getElementById('checkedModalTitle').textContent = 'チェック済み問題 ─ ' + cat + '（' + entries.length + '問）';

  var body = document.getElementById('checkedModalBody');
  if (entries.length === 0) {
    body.innerHTML = '<div class="empty">この分野でチェック済みの問題はありません</div>';
  } else {
    var html = '';
    entries.forEach(function(e) {
      var q = e.data.question || {};
      var meta = '';
      if (q.area) meta += '<span class="tag">' + escapeHtml(q.area) + '</span>';
      if (q.item) meta += '<span class="tag">' + escapeHtml(q.item) + '</span>';
      if (e.data.checkedAt) {
        var dt = new Date(e.data.checkedAt);
        meta += '<span style="color:#aaa;">★ ' + (dt.getMonth() + 1) + '/' + dt.getDate() + ' ' +
          String(dt.getHours()).padStart(2, '0') + ':' + String(dt.getMinutes()).padStart(2, '0') + '</span>';
      }
      html +=
        '<div class="ci">' +
          '<div class="ci-body">' +
            '<div class="ci-meta">' + meta + '</div>' +
            '<div class="ci-text">' + escapeHtml(q.question || '') + '</div>' +
          '</div>' +
          '<button class="ci-remove" title="チェック解除" onclick="removeCheckedItem(\'' + e.key + '\')">×</button>' +
        '</div>';
    });
    body.innerHTML = html;
  }
  document.getElementById('checkedOverlay').classList.add('show');
}

function closeCheckedList() {
  document.getElementById('checkedOverlay').classList.remove('show');
}

function removeCheckedItem(key) {
  var checks = loadChecks();
  delete checks[key];
  saveChecks(checks);
  // 再描画
  if (currentModalCategory) openCheckedList(currentModalCategory);
  renderToc(loadQuestions());
}

function clearChecksInCurrentCategory() {
  if (!currentModalCategory) return;
  if (!confirm('「' + currentModalCategory + '」のチェックをすべて解除します。よろしいですか？')) return;
  var checks = loadChecks();
  Object.keys(checks).forEach(function(k) {
    var entry = checks[k];
    if (entry && entry.question && (entry.question.category || '') === currentModalCategory) {
      delete checks[k];
    }
  });
  saveChecks(checks);
  closeCheckedList();
  renderToc(loadQuestions());
}

function startCheckedQuiz(cat) {
  var entries = getChecksByCategory(cat);
  if (entries.length === 0) { alert('この分野でチェック済みの問題はありません。'); return; }
  // mondai-random.html に checked=1 と category を渡す
  var url = 'mondai-random.html?checked=1&category=' + encodeURIComponent(cat) + '&seq=1';
  location.href = url;
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var ov = document.getElementById('checkedOverlay');
    if (ov && ov.classList.contains('show')) closeCheckedList();
  }
});

// 起動時にサーバからデータ同期を試みてから描画
(function bootstrap() {
  fetch('mondai-data.json', { cache: 'no-cache' })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function(data) {
      if (!Array.isArray(data) || data.length === 0) return;
      var stored = localStorage.getItem(STORAGE_KEY) || '';
      var remoteStr = JSON.stringify(data);
      if (stored !== remoteStr) {
        localStorage.setItem(STORAGE_KEY, remoteStr);
      }
    })
    .catch(function() {})
    .then(function() {
      renderToc(loadQuestions());
    });
})();
</script>
</body>
</html>
