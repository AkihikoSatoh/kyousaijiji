<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育法規スコープ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #f0f2f5;
  color: #333;
  line-height: 1.85;
  min-height: 100vh;
}

header {
  background: linear-gradient(135deg, #5d4037, #8d6e63);
  color: #fff;
  padding: 22px 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header h1 {
  font-size: 1.7em;
  letter-spacing: .04em;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  text-shadow: 0 2px 4px rgba(0,0,0,.25);
}
header h1 .title-icon {
  font-size: 1.1em;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,.35));
}
.header-desc {
  margin-top: 6px;
  font-size: .82em;
  opacity: .9;
}
.header-links { margin-top: 8px; }
.header-links a {
  color: rgba(255,255,255,.85);
  font-size: .98em;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,.4);
  padding: 9px 20px;
  border-radius: 7px;
  margin: 0 4px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-weight: bold;
}
.header-links a .link-icon { font-size: 1.15em; line-height: 1; }
.header-links a:hover { background: rgba(255,255,255,.15); }
.header-links a.link-glossary {
  background: #2ecc71;
  border-color: #2ecc71;
  color: #fff;
}
.header-links a.link-glossary:hover { background: #27ae60; }
.header-links a.link-houki {
  background: #8d6e63;
  border-color: #8d6e63;
  color: #fff;
}
.header-links a.link-houki:hover { background: #5d4037; }
.header-links a.link-quiz {
  background: #2196f3;
  border-color: #2196f3;
  color: #fff;
}
.header-links a.link-quiz:hover { background: #1976d2; }
.header-links a.link-mondai {
  background: #f39c12;
  border-color: #f39c12;
  color: #fff;
}
.header-links a.link-mondai:hover { background: #e67e22; }
.header-links a.link-home {
  background: #34495e;
  border-color: #34495e;
  color: #fff;
}
.header-links a.link-home:hover { background: #1c2833; }

.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* ── タブ ── */
.tabs {
  display: flex;
  background: #fff;
  border-radius: 10px 10px 0 0;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
}
.tab-btn {
  flex: 1;
  padding: 14px;
  border: none;
  background: #fff;
  cursor: pointer;
  font-size: .95em;
  font-family: inherit;
  color: #888;
  border-bottom: 3px solid transparent;
  transition: all .15s;
}
.tab-btn:hover { background: #f8f4ec; }
.tab-btn.active {
  color: #5d4037;
  border-bottom-color: #5d4037;
  font-weight: bold;
  background: #fdf8f0;
}

.panel {
  background: #fff;
  border-radius: 0 0 10px 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 18px 20px 24px;
}

/* ── 検索バー（法令名） ── */
.law-filter {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.law-filter select,
.law-filter input {
  padding: 9px 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: .9em;
  font-family: inherit;
  background: #fff;
}
.law-filter select { flex: 1; min-width: 200px; }
.law-filter input { flex: 2; min-width: 160px; }

.count-info {
  font-size: .85em;
  color: #888;
  margin-bottom: 12px;
}

/* ── 法令カード ── */
.law-list { display: flex; flex-direction: column; gap: 14px; }

.law-card {
  border: 1px solid #e8d8c4;
  border-left: 4px solid #8d6e63;
  border-radius: 6px;
  background: #fffdfa;
  overflow: hidden;
}
.law-card .law-heading {
  font-size: 1em;
  font-weight: bold;
  color: #5d4037;
  padding: 13px 18px;
  cursor: pointer;
  line-height: 1.6;
  display: flex;
  gap: 8px;
  align-items: flex-start;
  transition: background .15s;
}
.law-card .law-heading:hover { background: #faf3e7; }
.law-card.expanded .law-heading {
  border-bottom: 1px dashed #d7ccc8;
  background: #fdf6e9;
}
.law-card .toggle-icon {
  flex-shrink: 0;
  color: #8d6e63;
  font-size: .8em;
  transition: transform .2s;
  margin-top: 4px;
}
.law-card.expanded .toggle-icon {
  transform: rotate(90deg);
}
.law-card .heading-text { flex: 1; }
.law-card .law-heading .law-title {
  display: inline-block;
  margin-left: 8px;
  color: #8d6e63;
  font-weight: normal;
  font-size: .92em;
}
.law-card .law-content {
  display: none;
  padding: 14px 18px 16px;
}
.law-card.expanded .law-content { display: block; }
.law-card .law-text {
  font-size: 1em;
  color: #000;
  line-height: 2;
  white-space: pre-wrap;
  margin-bottom: 12px;
}
.law-card .law-text .hl {
  color: #3498db;
  font-weight: bold;
}
.law-card .search-hl,
.law-card .law-heading .search-hl {
  background: #fff59d;
  padding: 0 2px;
  border-radius: 2px;
}
.law-card .related {
  padding-top: 10px;
  border-top: 1px dashed #d7ccc8;
  font-size: .87em;
  color: #555;
}
.law-card .related-item {
  margin-bottom: 3px;
}
.law-card .related-label {
  color: #8d6e63;
  font-weight: bold;
  margin-right: 4px;
}
.related-link {
  color: #1976d2;
  text-decoration: underline;
  cursor: pointer;
  background: rgba(33,150,243,.08);
  padding: 0 3px;
  border-radius: 3px;
}
.related-link:hover {
  background: rgba(33,150,243,.22);
  color: #0d47a1;
}

@keyframes flash-card {
  0%   { background: #fff7d6; box-shadow: 0 0 0 3px #fff59d; }
  100% { background: #fffdfa; box-shadow: none; }
}
.law-card.flash {
  animation: flash-card 1.6s ease-out;
}

/* ── 法令用語を覚える ── */
.memorize-hint {
  background: #fef9e7;
  border-left: 3px solid #f1c40f;
  padding: 10px 14px;
  font-size: .85em;
  color: #555;
  margin-bottom: 14px;
  border-radius: 4px;
  line-height: 1.7;
}

/* 一覧でカードのヘディング全体をクリッカブルに（▶アイコンは非表示） */
#memList .law-card .law-heading { cursor: pointer; }
#memList .law-card .toggle-icon { display: none; }
#memList .law-content { display: none !important; }

.memorize-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 600;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.memorize-overlay.show { display: flex; }
.memorize-modal {
  background: #fff;
  border-radius: 12px;
  width: min(720px, 100%);
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,.3);
}
.memorize-header {
  background: linear-gradient(135deg, #5d4037, #8d6e63);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.memorize-header h3 {
  font-size: 1em;
  font-weight: bold;
  line-height: 1.5;
}
.memorize-close {
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(255,255,255,.18);
  color: #fff;
  font-size: 1.3em;
  cursor: pointer;
  border-radius: 4px;
}
.memorize-close:hover { background: rgba(255,255,255,.32); }

.memorize-body {
  flex: 1;
  overflow-y: auto;
  padding: 22px 24px;
  background: #fffdfa;
}
.memorize-text {
  font-size: 1.05em;
  line-height: 2.1;
  color: #000;
  white-space: pre-wrap;
}
.memorize-text .hl {
  color: #3498db;
  font-weight: bold;
}
/* 隠し用語: 通常時は背景色と同じ文字色で見えなくする */
.memorize-text .hl.hidden-term {
  background: #3498db;
  color: #3498db;
  border-radius: 3px;
  padding: 0 4px;
  user-select: none;
}
.memorize-body.show-terms .memorize-text .hl.hidden-term {
  color: #fff;
  background: #3498db;
}

.memorize-related {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px dashed #d7ccc8;
  font-size: .9em;
  color: #555;
}
.memorize-related .related-item { margin-bottom: 4px; }
.memorize-related .related-label {
  color: #8d6e63;
  font-weight: bold;
  margin-right: 4px;
}

.memorize-footer {
  border-top: 1px solid #eee;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  background: #fff;
}
.reshuffle-btn {
  padding: 11px 16px;
  border: 1px solid #8d6e63;
  border-radius: 6px;
  background: #fff;
  color: #5d4037;
  font-size: .88em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.reshuffle-btn:hover { background: #faf3e7; }

.check-terms-btn {
  flex: 1;
  padding: 11px 18px;
  border: none;
  border-radius: 6px;
  background: linear-gradient(135deg, #3498db, #2980b9);
  color: #fff;
  font-size: .92em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  user-select: none;
  -webkit-user-select: none;
}
.check-terms-btn:hover { opacity: .92; }
.check-terms-btn:active,
.check-terms-btn.pressing {
  background: linear-gradient(135deg, #1f618d, #154360);
  transform: scale(.98);
}
.memorize-close-btn {
  padding: 11px 24px;
  border: none;
  border-radius: 6px;
  background: #eee;
  color: #555;
  font-size: .92em;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
}
.memorize-close-btn:hover { background: #e0e0e0; }

.empty-msg {
  text-align: center;
  padding: 40px 20px;
  color: #aaa;
  font-size: .95em;
}
.info-msg {
  text-align: center;
  padding: 30px 20px;
  color: #666;
  font-size: .9em;
}

/* ── 用語検索（プレースホルダ） ── */
.coming-soon {
  text-align: center;
  padding: 50px 20px;
  color: #aaa;
}
.coming-soon h3 {
  font-size: 1.05em;
  color: #999;
  margin-bottom: 8px;
}

@media (max-width: 600px) {
  header h1 { font-size: 1.25em; }
  .panel { padding: 14px 14px 20px; }
  .law-card { padding: 12px 14px; }
  .law-card .law-heading { font-size: .95em; }
}
</style>
</head>
<body>

<header>
  <h1><span class="title-icon">⚖️</span>教育法規スコープ</h1>
  <p class="header-desc">教員採用試験の必出の27法令・317条文を収録しています。</p>
  <div class="header-links">
    <a href="kyoshoku.html" class="link-home"><span class="link-icon">🏠</span>教職教養トップへ</a>
  </div>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab-btn active" id="tab-law"      onclick="switchTab('law')">法令名から検索</button>
    <button class="tab-btn"        id="tab-term"     onclick="switchTab('term')">用語から検索</button>
    <button class="tab-btn"        id="tab-memorize" onclick="switchTab('memorize')">法令用語を覚える</button>
  </div>

  <!-- 法令名から検索 -->
  <div class="panel" id="panel-law">
    <div class="law-filter">
      <select id="filterLaw" onchange="renderLawList()">
        <option value="">全法令</option>
      </select>
    </div>
    <div class="count-info" id="lawCount"></div>
    <div class="law-list" id="lawList"></div>
  </div>

  <!-- 法令用語を覚える -->
  <div class="panel" id="panel-memorize" style="display:none;">
    <div class="law-filter">
      <select id="memFilterLaw" onchange="renderMemorizeList()">
        <option value="">全法令</option>
      </select>
    </div>
    <p class="memorize-hint">法令名をクリックすると条文が表示されます。条文中の<span style="color:#3498db;font-weight:bold;">青字部分（重要用語）</span>が隠された状態で出題されるので、考えながら確認してみましょう。</p>
    <div class="count-info" id="memCount"></div>
    <div class="law-list" id="memList"></div>
  </div>

  <!-- 暗記用モーダル -->
  <div class="memorize-overlay" id="memOverlay" onclick="if(event.target===this)closeMemorize()">
    <div class="memorize-modal">
      <div class="memorize-header">
        <h3 id="memTitle">条文</h3>
        <button class="memorize-close" onclick="closeMemorize()">&times;</button>
      </div>
      <div class="memorize-body">
        <div class="memorize-text" id="memText"></div>
        <div class="memorize-related" id="memRelated"></div>
      </div>
      <div class="memorize-footer">
        <button class="reshuffle-btn" id="reshuffleBtn" onclick="reshuffleMemorize()" title="別の用語を隠す">🔀 別の用語で</button>
        <button class="check-terms-btn" id="checkTermsBtn">用語を確認（押している間表示）</button>
        <button class="memorize-close-btn" onclick="closeMemorize()">閉じる</button>
      </div>
    </div>
  </div>

  <!-- 用語から検索 -->
  <div class="panel" id="panel-term" style="display:none;">
    <div class="law-filter">
      <input type="text" id="termInput" placeholder="用語を入力（例: 学問、いじめ、職員会議）" oninput="renderTermSearch()">
    </div>
    <div class="count-info" id="termCount"></div>
    <div class="law-list" id="termList"></div>
  </div>

</div>

<script src="houki-scope-data.js"></script>
<script>
// バンドル版 (HOUKI_DATA) と localStorage の内容を比較し、異なれば localStorage を更新
(function() {
  try {
    var bundleStr = JSON.stringify(HOUKI_DATA);
    var stored = localStorage.getItem('kyosai_houki_data') || '';
    if (stored && stored !== bundleStr) {
      // 内容が異なる → バンドル（最新）に同期
      try {
        var oldCount = JSON.parse(stored).length;
        var newCount = HOUKI_DATA.length;
        if (oldCount !== newCount) {
          console.log('[教育法規スコープ] データ更新: ' + oldCount + '条 → ' + newCount + '条');
        }
      } catch (e) {}
      localStorage.setItem('kyosai_houki_data', bundleStr);
    } else if (!stored) {
      // 初回: localStorageに保存
      localStorage.setItem('kyosai_houki_data', bundleStr);
    }
  } catch (e) {}
})();

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ＊...＊ で囲まれた部分を青色ハイライトに変換
function renderHighlight(text) {
  return escapeHtml(text || '').replace(/＊(.+?)＊/g, '<span class="hl">$1</span>');
}

// 関連法令の文字列をパースして、法令名・条文番号にリンクを付与
function renderRelated(text) {
  if (!text) return '';

  // データから法令名一覧（重複なし、長い順）を作成
  var laws = [];
  HOUKI_DATA.forEach(function(d) {
    if (d.law && laws.indexOf(d.law) === -1) laws.push(d.law);
  });
  laws.sort(function(a, b) { return b.length - a.length; });

  var ARTICLE_RE = /^(第[0-9０-９一二三四五六七八九十百千]+条(?:の[0-9０-９一二三四五六七八九十]+)?)/;

  var segs = [];
  var currentLaw = null;
  var i = 0;

  while (i < text.length) {
    // 法令名にマッチ？
    var matchedLaw = null;
    for (var k = 0; k < laws.length; k++) {
      if (text.substr(i, laws[k].length) === laws[k]) {
        matchedLaw = laws[k];
        break;
      }
    }
    if (matchedLaw) {
      currentLaw = matchedLaw;
      // 直後に「第N条」があれば、法令名+条 を1つのリンクに
      var after = i + matchedLaw.length;
      var artM = ARTICLE_RE.exec(text.substr(after));
      if (artM) {
        segs.push({ type: 'link', content: matchedLaw + artM[1], law: matchedLaw, article: artM[1] });
        i = after + artM[1].length;
      } else {
        // 法令名のみリンク（条なしの場合）
        segs.push({ type: 'link', content: matchedLaw, law: matchedLaw, article: '' });
        i = after;
      }
      continue;
    }

    // 法令名に続く「第N条」のみのマッチ（直前の法令を継承）
    var artOnly = ARTICLE_RE.exec(text.substr(i));
    if (artOnly && currentLaw) {
      segs.push({ type: 'link', content: artOnly[1], law: currentLaw, article: artOnly[1] });
      i += artOnly[1].length;
      continue;
    }

    // それ以外は1文字ずつテキスト扱い
    segs.push({ type: 'text', content: text.charAt(i) });
    i++;
  }

  // 連続するテキストセグメントを結合
  var html = '';
  segs.forEach(function(s) {
    if (s.type === 'link') {
      html += '<a class="related-link" data-law="' + escapeHtml(s.law) +
              '" data-article="' + escapeHtml(s.article) + '">' +
              escapeHtml(s.content) + '</a>';
    } else {
      html += escapeHtml(s.content);
    }
  });
  return html;
}

// 該当条文へジャンプ
function jumpToArticle(lawName, articleNum) {
  switchTab('law');
  document.getElementById('filterLaw').value = lawName || '';
  renderLawList();

  setTimeout(function() {
    var cards = document.querySelectorAll('#lawList .law-card');
    var target = null;
    if (articleNum) {
      for (var i = 0; i < cards.length; i++) {
        var heading = cards[i].querySelector('.heading-text');
        if (!heading) continue;
        if ((heading.textContent || '').indexOf(articleNum) !== -1) {
          target = cards[i];
          break;
        }
      }
    }
    if (!target && cards.length > 0) target = cards[0];
    if (target) {
      target.classList.add('expanded');
      target.classList.remove('flash');
      void target.offsetWidth;
      target.classList.add('flash');
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 60);
}

// 関連法令リンクのクリックを委譲
document.addEventListener('click', function(e) {
  var link = e.target.closest && e.target.closest('.related-link');
  if (!link) return;
  e.preventDefault();
  jumpToArticle(link.getAttribute('data-law'), link.getAttribute('data-article'));
});

function switchTab(name) {
  ['law', 'term', 'memorize'].forEach(function(n) {
    document.getElementById('tab-' + n).classList.toggle('active', n === name);
    document.getElementById('panel-' + n).style.display = n === name ? 'block' : 'none';
  });
}

// 法令プルダウンの選択肢を生成（出現順）
function populateLawFilter() {
  var laws = [];
  HOUKI_DATA.forEach(function(d) {
    if (d.law && laws.indexOf(d.law) === -1) laws.push(d.law);
  });
  var sel = document.getElementById('filterLaw');
  laws.forEach(function(l) {
    var opt = document.createElement('option');
    opt.value = l;
    opt.textContent = l;
    sel.appendChild(opt);
  });
}

function renderLawList() {
  var lawF = document.getElementById('filterLaw').value;
  var container = document.getElementById('lawList');

  var filtered = HOUKI_DATA.slice();
  if (lawF) filtered = filtered.filter(function(d) { return d.law === lawF; });

  document.getElementById('lawCount').textContent = filtered.length + ' 件';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-msg">該当する条文はありません</div>';
    return;
  }

  var html = '';
  filtered.forEach(function(d) {
    var heading =
      escapeHtml(d.law) +
      (d.article ? '　' + escapeHtml(d.article) : '') +
      (d.title ? '<span class="law-title">〔' + escapeHtml(d.title) + '〕</span>' : '');
    var related = '';
    if (d.related && d.related.length > 0) {
      related = '<div class="related">';
      var labels = ['①','②','③','④','⑤'];
      d.related.forEach(function(r, i) {
        related += '<div class="related-item">' +
          '<span class="related-label">関連法令等' + (labels[i] || (i + 1)) + '：</span>' +
          renderRelated(r) + '</div>';
      });
      related += '</div>';
    }
    html +=
      '<div class="law-card">' +
        '<div class="law-heading">' +
          '<span class="toggle-icon">▶</span>' +
          '<span class="heading-text">' + heading + '</span>' +
        '</div>' +
        '<div class="law-content">' +
          '<div class="law-text">' + renderHighlight(d.text) + '</div>' +
          related +
        '</div>' +
      '</div>';
  });
  container.innerHTML = html;

  // クリックで開閉
  container.querySelectorAll('.law-card').forEach(function(card) {
    card.querySelector('.law-heading').onclick = function() {
      card.classList.toggle('expanded');
    };
  });
}

// 検索キーワードのハイライト（HTMLタグの内側は除外）
function highlightSearchTerm(html, term) {
  if (!term) return html;
  var esc = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var pattern = new RegExp('(' + esc + ')', 'g');
  // HTMLタグとテキスト部に分けて、テキスト部のみハイライト
  return html.split(/(<[^>]*>)/).map(function(p) {
    if (p.charAt(0) === '<') return p;
    return p.replace(pattern, '<span class="search-hl">$1</span>');
  }).join('');
}

// 用語検索（条文・タイトル・法令名に含まれる）
function renderTermSearch() {
  var term = document.getElementById('termInput').value.trim();
  var container = document.getElementById('termList');
  var countEl = document.getElementById('termCount');

  if (!term) {
    container.innerHTML = '<div class="info-msg">用語を入力すると、その用語を含む条文を一覧表示します。</div>';
    countEl.textContent = '';
    return;
  }

  // ＊マーカーを除去した本文で検索
  var filtered = HOUKI_DATA.filter(function(d) {
    var hay =
      (d.text || '').replace(/＊/g, '') + ' ' +
      (d.title || '') + ' ' +
      (d.law || '') + ' ' +
      (d.article || '');
    return hay.indexOf(term) !== -1;
  });

  countEl.textContent = filtered.length + ' 件 ヒット';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-msg">該当する条文はありません</div>';
    return;
  }

  var labels = ['①','②','③','④','⑤'];
  var html = '';
  filtered.forEach(function(d) {
    var headingPlain =
      escapeHtml(d.law) +
      (d.article ? '　' + escapeHtml(d.article) : '') +
      (d.title ? '<span class="law-title">〔' + escapeHtml(d.title) + '〕</span>' : '');
    var heading = highlightSearchTerm(headingPlain, term);

    var bodyHtml = renderHighlight(d.text);
    bodyHtml = highlightSearchTerm(bodyHtml, term);

    var related = '';
    if (d.related && d.related.length > 0) {
      related = '<div class="related">';
      d.related.forEach(function(r, i) {
        related += '<div class="related-item">' +
          '<span class="related-label">関連法令等' + (labels[i] || (i + 1)) + '：</span>' +
          renderRelated(r) + '</div>';
      });
      related += '</div>';
    }
    html +=
      '<div class="law-card">' +
        '<div class="law-heading">' +
          '<span class="toggle-icon">▶</span>' +
          '<span class="heading-text">' + heading + '</span>' +
        '</div>' +
        '<div class="law-content">' +
          '<div class="law-text">' + bodyHtml + '</div>' +
          related +
        '</div>' +
      '</div>';
  });
  container.innerHTML = html;

  container.querySelectorAll('.law-card').forEach(function(card) {
    card.querySelector('.law-heading').onclick = function() {
      card.classList.toggle('expanded');
    };
  });
}

// ── 法令用語を覚える ──
function populateMemFilter() {
  var laws = [];
  HOUKI_DATA.forEach(function(d) {
    if (d.law && laws.indexOf(d.law) === -1) laws.push(d.law);
  });
  var sel = document.getElementById('memFilterLaw');
  laws.forEach(function(l) {
    var opt = document.createElement('option');
    opt.value = l;
    opt.textContent = l;
    sel.appendChild(opt);
  });
}

function renderMemorizeList() {
  var lawF = document.getElementById('memFilterLaw').value;
  var container = document.getElementById('memList');

  var filtered = HOUKI_DATA.slice();
  if (lawF) filtered = filtered.filter(function(d) { return d.law === lawF; });

  document.getElementById('memCount').textContent = filtered.length + ' 件';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-msg">該当する条文はありません</div>';
    return;
  }

  var html = '';
  filtered.forEach(function(d, idx) {
    var heading =
      escapeHtml(d.law) +
      (d.article ? '　' + escapeHtml(d.article) : '') +
      (d.title ? '<span class="law-title">〔' + escapeHtml(d.title) + '〕</span>' : '');
    html +=
      '<div class="law-card" data-index="' + idx + '">' +
        '<div class="law-heading">' +
          '<span class="heading-text">' + heading + '</span>' +
        '</div>' +
      '</div>';
  });
  container.innerHTML = html;

  container.querySelectorAll('.law-card').forEach(function(card, i) {
    card.querySelector('.law-heading').onclick = function() {
      openMemorize(filtered[i]);
    };
  });
}

var currentMemorizeData = null;

function applyMemorizeMask(text) {
  // ＊...＊ の出現箇所を抽出
  var matches = [];
  var re = /＊(.+?)＊/g;
  var m;
  while ((m = re.exec(text)) !== null) {
    matches.push({ start: m.index, end: m.index + m[0].length, content: m[1] });
  }

  // 隠す数を決定: 全体の30%以上70%未満
  var totalCount = matches.length;
  var hideCount;
  if (totalCount <= 0) hideCount = 0;
  else if (totalCount === 1) hideCount = 1;
  else {
    var minHide = Math.max(1, Math.ceil(0.3 * totalCount));
    var maxHide = Math.ceil(0.7 * totalCount) - 1; // 70%未満
    if (maxHide < minHide) maxHide = minHide;
    if (maxHide > totalCount) maxHide = totalCount;
    hideCount = minHide + Math.floor(Math.random() * (maxHide - minHide + 1));
  }

  // 隣接（2連続）を避けつつ、hideCount 個のインデックスを選ぶ
  var hiddenIndices = [];
  if (hideCount >= totalCount) {
    for (var i0 = 0; i0 < totalCount; i0++) hiddenIndices.push(i0);
  } else {
    var pool = [];
    for (var i1 = 0; i1 < totalCount; i1++) pool.push(i1);
    while (hiddenIndices.length < hideCount && pool.length > 0) {
      var pickAt = Math.floor(Math.random() * pool.length);
      var picked = pool[pickAt];
      hiddenIndices.push(picked);
      pool = pool.filter(function(x) { return Math.abs(x - picked) > 1; });
    }
    if (hiddenIndices.length < hideCount) {
      var remaining = [];
      for (var i2 = 0; i2 < totalCount; i2++) {
        if (hiddenIndices.indexOf(i2) === -1) remaining.push(i2);
      }
      for (var k = remaining.length - 1; k > 0; k--) {
        var j = Math.floor(Math.random() * (k + 1));
        var tmp = remaining[k]; remaining[k] = remaining[j]; remaining[j] = tmp;
      }
      while (hiddenIndices.length < hideCount && remaining.length > 0) {
        hiddenIndices.push(remaining.shift());
      }
    }
  }
  var hiddenMap = {};
  hiddenIndices.forEach(function(i) { hiddenMap[i] = true; });

  // テキストを再構築（隠す用語のみ hidden-term クラス、それ以外は通常の青字）
  var html = '';
  var pos = 0;
  matches.forEach(function(match, idx) {
    html += escapeHtml(text.substring(pos, match.start));
    var cls = hiddenMap[idx] ? 'hl hidden-term' : 'hl';
    html += '<span class="' + cls + '">' + escapeHtml(match.content) + '</span>';
    pos = match.end;
  });
  html += escapeHtml(text.substring(pos));
  return html;
}

function renderMemorizeBody() {
  if (!currentMemorizeData) return;
  document.getElementById('memText').innerHTML = applyMemorizeMask(currentMemorizeData.text || '');
  // 隠し状態にリセット
  var body = document.querySelector('.memorize-body');
  if (body) body.classList.remove('show-terms');
}

function reshuffleMemorize() {
  renderMemorizeBody();
}

function openMemorize(d) {
  currentMemorizeData = d;

  var title =
    escapeHtml(d.law) +
    (d.article ? '　' + escapeHtml(d.article) : '') +
    (d.title ? '〔' + escapeHtml(d.title) + '〕' : '');
  document.getElementById('memTitle').innerHTML = title;

  renderMemorizeBody();

  // 関連法令等は表示しない
  var relEl = document.getElementById('memRelated');
  relEl.innerHTML = '';
  relEl.style.display = 'none';

  document.getElementById('memOverlay').classList.add('show');
}

function closeMemorize() {
  var body = document.querySelector('.memorize-body');
  if (body) body.classList.remove('show-terms');
  document.getElementById('memOverlay').classList.remove('show');
}

// 「用語を確認」ボタンの押している間表示
(function setupCheckBtn() {
  var btn = document.getElementById('checkTermsBtn');
  if (!btn) return;
  var body = document.querySelector('.memorize-body');
  function show() {
    body.classList.add('show-terms');
    btn.classList.add('pressing');
  }
  function hide() {
    body.classList.remove('show-terms');
    btn.classList.remove('pressing');
  }
  btn.addEventListener('mousedown', show);
  btn.addEventListener('mouseup', hide);
  btn.addEventListener('mouseleave', hide);
  btn.addEventListener('touchstart', function(e) { e.preventDefault(); show(); }, { passive: false });
  btn.addEventListener('touchend', hide);
  btn.addEventListener('touchcancel', hide);
  // キーボード: Enter/Space で長押し
  btn.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); show(); }
  });
  btn.addEventListener('keyup', function(e) {
    if (e.key === 'Enter' || e.key === ' ') hide();
  });
})();

// Esc で閉じる
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var ov = document.getElementById('memOverlay');
    if (ov && ov.classList.contains('show')) closeMemorize();
  }
});

// 初期化
populateLawFilter();
populateMemFilter();
renderLawList();
renderMemorizeList();
renderTermSearch();
</script>
