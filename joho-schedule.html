<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>受験までの年間スケジュール＆月別Todoリスト ─ 教採ナビ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #f0f2f5;
  color: #333;
  line-height: 1.8;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #117a65, #1abc9c);
  color: #fff;
  padding: 22px 20px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header h1 {
  font-size: 1.4em;
  letter-spacing: .04em;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  text-shadow: 0 2px 4px rgba(0,0,0,.25);
  flex-wrap: wrap;
  justify-content: center;
}
header h1 .title-icon {
  font-size: 1.15em;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,.35));
}
.header-links { margin-top: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.header-links a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  background: #34495e;
  color: #fff;
  border: 1px solid #34495e;
  border-radius: 7px;
  text-decoration: none;
  font-size: .88em;
  font-weight: bold;
}
.header-links a:hover { background: #1c2833; }
.header-links a.back-joho {
  background: #fff;
  color: #117a65;
  border-color: #fff;
}
.header-links a.back-joho:hover { background: #d1f2eb; color: #0e5b4a; }

.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 30px 16px;
}

/* 本文 */
.content-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 32px 32px;
  font-size: 1em;
  line-height: 2;
  white-space: pre-wrap;
  color: #333;
}
.content-card strong { color: #117a65; font-weight: bold; font-size: 1.15em; }
.content-card b { font-weight: bold; }
.content-card u { text-decoration: underline; }
.content-card .content-img {
  display: block;
  max-width: 100%;
  height: auto;
  margin: 18px 0;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}

/* 準備中（コンテンツ未登録時） */
.coming {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 50px 30px;
  text-align: center;
}
.coming .icon { font-size: 3.5em; margin-bottom: 14px; }
.coming h2 {
  font-size: 1.3em;
  color: #117a65;
  margin-bottom: 14px;
}
.coming p {
  color: #666;
  font-size: .95em;
  line-height: 1.9;
}

.updated {
  text-align: right;
  font-size: .78em;
  color: #999;
  margin-top: 14px;
}

@media (max-width: 600px) {
  header h1 { font-size: 1.1em; }
  .content-card { padding: 22px 18px; font-size: .95em; }
}
</style>
</head>
<body>
<header>
  <h1><span class="title-icon">📅</span>受験までの年間スケジュール＆月別Todoリスト</h1>
  <div class="header-links">
    <a href="joho.html" class="back-joho">← 教採関連情報 トップへ</a>
    <a href="index.html">🏠 教採ナビ トップへ</a>
  </div>
</header>

<div class="container" id="container">
  <!-- 動的に挿入 -->
</div>

<script>
var STORAGE_KEY = 'kyosai_joho_schedule';

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBody(text) {
  if (!text) return '';
  var s = String(text);

  var images = [];
  s = s.replace(/!\[\]\(([^)]+)\)/g, function(_, url) {
    images.push(url);
    return 'IMG' + (images.length - 1) + '';
  });

  s = escapeHtml(s);
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  s = s.replace(/__(.+?)__/g, '<u>$1</u>');

  for (var i = 0; i < images.length; i++) {
    var marker = 'IMG' + i + '';
    var safe = images[i].replace(/"/g, '&quot;');
    s = s.split(marker).join('<img class="content-img" src="' + safe + '" alt="">');
  }
  return s;
}

function loadStored() {
  try {
    var s = localStorage.getItem(STORAGE_KEY);
    if (!s) return null;
    var obj = JSON.parse(s);
    return (obj && typeof obj.body === 'string') ? obj : null;
  } catch (e) { return null; }
}

function renderPage(obj) {
  var container = document.getElementById('container');
  if (!obj || !obj.body || !obj.body.trim()) {
    container.innerHTML =
      '<div class="coming">' +
        '<div class="icon">🛠️</div>' +
        '<h2>準備中</h2>' +
        '<p>「受験までの年間スケジュール＆月別Todoリスト」のコンテンツは現在準備中です。<br>' +
        '試験本番までの1年間の学習計画と、月ごとにやるべきことを順次公開予定です。</p>' +
      '</div>';
    return;
  }
  var html = '<div class="content-card">' + renderBody(obj.body) + '</div>';
  if (obj.updatedAt) {
    try {
      var d = new Date(obj.updatedAt);
      if (!isNaN(d.getTime())) {
        var y = d.getFullYear();
        var m = ('0' + (d.getMonth() + 1)).slice(-2);
        var dd = ('0' + d.getDate()).slice(-2);
        html += '<div class="updated">最終更新: ' + y + '/' + m + '/' + dd + '</div>';
      }
    } catch (e) {}
  }
  container.innerHTML = html;
}

// 起動時: サーバJSONと同期しつつlocalStorageから表示
(function bootstrap() {
  fetch('joho-schedule-data.json', { cache: 'no-cache' })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
    .then(function(data) {
      if (!data || typeof data.body !== 'string') return;
      var stored = loadStored();
      // localStorageが空ならサーバのデータをセット
      if (!stored) {
        var obj = { body: data.body, updatedAt: new Date().toISOString() };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); } catch (e) {}
      }
    })
    .catch(function() {})
    .then(function() {
      renderPage(loadStored());
    });
})();
</script>
</body>
</html>
